name: Build TWA APK/AAB from PWA (Self-hosted)

on:
  workflow_dispatch:
    inputs:
      manifest_url:
        description: 'Full HTTPS URL to your PWA manifest.json'
        required: true
        default: 'https://your-pwa.netlify.app/manifest.json'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Create build folder
        run: mkdir -p twa-build

      - name: Initialize TWA from your PWA
        run: |
          bubblewrap init \
            --manifest "${{ github.event.inputs.manifest_url }}" \
            --directory ./twa-build \
            --skipPwaValidation || true

      - name: Build signed AAB + APK
        run: |
          cd twa-build
          bubblewrap build --universalApk || true

      - name: Upload APK and AAB
        uses: actions/upload-artifact@v4
        with:
          name: TWA-Build-Output
          path: |
            twa-build/app-release-bundle.aab
            twa-build/app-release-signed.apk
          retention-days: 7
